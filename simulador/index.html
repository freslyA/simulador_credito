<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
    <script src="utils.js"></script>
    <script src="simulador.js"></script>
    <script src="funciones.js"></script>
</head>
<body>

    <div class="container">

        <div style="text-align:center; margin-bottom:15px;">
            <img src="pichincha.jpg" alt="Banco" style="width:120px;">
        </div>

        <h1>Simulador de Crédito</h1>

        <h2>Datos financieros</h2>
        <label for="txtIngresos">Ingresos:</label>
        <input type="text" id="txtIngresos" onblur="validarNumero(this)">
        <small class="error"></small>
        <label for="txtEgresos">Egresos:</label>
        <input type="text" id="txtArriendo"  placeholder="Ingresa el valor de tu arriendo" onblur="validarNumero(this)">
        <small class="error"></small>
        <input type="text" id="txtAlimentacion"  placeholder="Ingresa el valor de tu alimentacion" onblur="validarNumero(this)">
        <small class="error"></small>
        <input type="text" id="txtVarios"  placeholder="Ingresa el valor de tus gatos varios" onblur="validarNumero(this)">
        <small class="error"></small>
        <p>Gastos Totales : <span id="gastos"></span></p>
        <p>Disponible: <span id="spnDisponible"></span></p>
        <p>Capacidad de pago mensual: <span id="spnCapacidadPago"></span></p>

        <h2>Solicitud de crédito</h2>
        <label for="txtMonto">Monto:</label>
        <input type="text" id="txtMonto" onblur="validarNumero(this)">
        <small class="error"></small>
        <label for="txtPlazo">Plazo en años:</label>
        <input type="text" id="txtPlazo" onblur="validarNumero(this)">
        <small class="error"></small>
        <label for="txtTasaInteres">Tasa de interés:</label>
        <input type="text" id="txtTasaInteres" onblur="validarNumero(this)">
        <small class="error"></small>
        <p>Interés a pagar: <span id="spnInteresPagar"></span></p>
        <p>Total préstamo: <span id="spnTotalPrestamo"></span></p>
        <p>Cuota mensual: <span id="spnCuotaMensual"></span></p>
        <p>Estado de crédito: <span id="spnEstadoCredito">ANALIZANDO...</span></p>

        <div class="buttons">
            <button id="btnCalcularCredito" onclick="calcular();">Calcular Crédito</button>
            <button id="btnReiniciar" onclick="reiniciar();">Reiniciar</button>
        </div>
    </div>

</body>
</html>
